name: SignalBot Daily Signal

on:
  schedule:
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy python-dotenv schedule requests

      - name: Run SignalBot
        run: |
          python market_bot_v8_small.py

      - name: Push signals to GitHub
        run: |
          git config --global user.name "SignalBot Auto"
          git config --global user.email "bot@signalbot.com"
          git add signals.json capital_log.txt my_capital.txt
          git diff --staged --quiet || git commit -m "Auto signal $(date +'%d-%b %H:%M')"
          git push
